<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BETA — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <span class="logo-icon">&#9670;</span>
        <h1 class="logo-text">BETA</h1>
        <p class="auth-subtitle">Ingresa a tu cuenta para continuar</p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" class="form-control" placeholder="Ej. admin" required>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <div id="loginError" class="auth-error hidden">Credenciales incorrectas. Intenta de nuevo.</div>
        
        <button type="submit" class="btn btn-primary btn-block" style="width: 100%; justify-content: center; margin-top: 10px;">Ingresar</button>
      </form>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
