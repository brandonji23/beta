<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BETA — Sistema de Gestión de Inventarios</title>
  <meta name="description" content="BETA: Sistema completo de gestión de inventarios, ventas, proveedores, clientes y despacho.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">&#9670;</span>
      <span class="logo-text">BETA</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-module="dashboard">
        <span class="nav-icon">&#9673;</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="#" class="nav-item" data-module="inventario">
        <span class="nav-icon">&#9783;</span>
        <span class="nav-label">Inventario</span>
      </a>
      <a href="#" class="nav-item" data-module="ventas">
        <span class="nav-icon">&#9733;</span>
        <span class="nav-label">Ventas</span>
      </a>
      <a href="#" class="nav-item" data-module="proveedores">
        <span class="nav-icon">&#9870;</span>
        <span class="nav-label">Proveedores</span>
      </a>
      <a href="#" class="nav-item" data-module="clientes">
        <span class="nav-icon">&#9823;</span>
        <span class="nav-label">Clientes</span>
      </a>
      <a href="#" class="nav-item" data-module="despacho">
        <span class="nav-icon">&#9944;</span>
        <span class="nav-label">Despacho</span>
      </a>
    </nav>
    <button id="sidebarToggle" class="sidebar-toggle" title="Colapsar menú">&#10094;</button>
  </aside>

  <!-- MAIN WRAPPER -->
  <div id="mainWrapper" class="main-wrapper">
    <!-- TOP BAR -->
    <header class="topbar">
      <h1 class="topbar-title" id="pageTitle">Dashboard</h1>
      <div class="topbar-actions">
        <button class="topbar-btn" id="notifBtn" title="Notificaciones">
          &#128276;
          <span class="notif-badge" id="notifBadge">0</span>
        </button>
        <div class="topbar-avatar" id="avatarBtn" title="Usuario">
          <span>AD</span>
        </div>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <main class="content-area" id="contentArea">
      <!-- Modules rendered here by JS -->
    </main>
  </div>

  <!-- MODAL OVERLAY -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-container" id="modalContainer">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Modal</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="script.js"></script>
</body>
</html>
